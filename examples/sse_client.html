<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Agent - Real-time Task Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #f56565;
            color: white;
        }

        .btn-danger:hover {
            background: #e53e3e;
        }

        .status-badge {
            display: inline-block;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending { background: #fbbf24; color: #78350f; }
        .status-running { background: #60a5fa; color: #1e3a8a; }
        .status-completed { background: #34d399; color: #065f46; }
        .status-failed { background: #f87171; color: #7f1d1d; }
        .status-cancelled { background: #9ca3af; color: #1f2937; }

        .event-log {
            background: #f8f9fa;
            border-radius: 5px;
            padding: 15px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
        }

        .event-item {
            padding: 8px;
            margin-bottom: 8px;
            border-left: 3px solid #667eea;
            background: white;
            border-radius: 3px;
        }

        .event-time {
            color: #888;
            font-size: 11px;
        }

        .event-type {
            color: #667eea;
            font-weight: 600;
            margin: 0 8px;
        }

        .connection-status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f8f9fa;
            border-radius: 20px;
            font-size: 13px;
        }

        .status-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-connected { background: #34d399; }
        .status-disconnected { background: #f87171; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🤖 AI Agent - Real-time Task Monitor</h1>
            <p class="subtitle">Create tasks and watch real-time status updates via Server-Sent Events (SSE)</p>

            <div class="input-group">
                <label>Task Action:</label>
                <input type="text" id="action" value="echo" placeholder="e.g., echo, translate">
            </div>

            <div class="input-group">
                <label>Parameters (JSON):</label>
                <textarea id="parameters" rows="3" placeholder='{"message": "Hello World"}'>{"message": "Hello World"}</textarea>
            </div>

            <div class="button-group">
                <button class="btn-primary" onclick="createTask()">🚀 Create Task</button>
                <button class="btn-danger" onclick="cancelTask()" id="cancelBtn" disabled>❌ Cancel Task</button>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h2>📡 Real-time Events</h2>
                <div class="connection-status">
                    <div class="status-indicator" id="statusIndicator"></div>
                    <span id="connectionStatus">Disconnected</span>
                </div>
            </div>

            <div id="taskInfo" style="margin-bottom: 15px; display: none;">
                <strong>Task ID:</strong> <span id="taskId"></span><br>
                <strong>Status:</strong> <span id="taskStatus"></span>
            </div>

            <div class="event-log" id="eventLog">
                <div style="color: #888; text-align: center; padding: 20px;">
                    No events yet. Create a task to start monitoring.
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8080/api/v1';
        let eventSource = null;
        let currentTaskId = null;

        function log(type, message, data = null) {
            const logElement = document.getElementById('eventLog');
            const time = new Date().toLocaleTimeString();

            const eventItem = document.createElement('div');
            eventItem.className = 'event-item';

            let content = `<span class="event-time">${time}</span>`;
            content += `<span class="event-type">${type}</span>`;
            content += `<span>${message}</span>`;

            if (data) {
                content += `<pre style="margin: 5px 0 0 0; color: #666;">${JSON.stringify(data, null, 2)}</pre>`;
            }

            eventItem.innerHTML = content;
            logElement.appendChild(eventItem);
            logElement.scrollTop = logElement.scrollHeight;

            // Clear "no events" message
            const placeholder = logElement.querySelector('[style*="text-align: center"]');
            if (placeholder) placeholder.remove();
        }

        function updateConnectionStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const status = document.getElementById('connectionStatus');

            if (connected) {
                indicator.className = 'status-indicator status-connected';
                status.textContent = 'Connected';
            } else {
                indicator.className = 'status-indicator status-disconnected';
                status.textContent = 'Disconnected';
            }
        }

        function updateTaskStatus(status) {
            const statusElement = document.getElementById('taskStatus');
            statusElement.innerHTML = `<span class="status-badge status-${status}">${status}</span>`;
        }

        async function createTask() {
            const action = document.getElementById('action').value;
            const parametersText = document.getElementById('parameters').value;

            let parameters;
            try {
                parameters = JSON.parse(parametersText);
            } catch (e) {
                alert('Invalid JSON in parameters field');
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/tasks`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        action: action,
                        parameters: parameters
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentTaskId = data.data.id;
                    document.getElementById('taskId').textContent = currentTaskId;
                    document.getElementById('taskInfo').style.display = 'block';
                    document.getElementById('cancelBtn').disabled = false;

                    log('✅ CREATED', 'Task created successfully', { taskId: currentTaskId });

                    // Start SSE connection
                    connectSSE(currentTaskId);
                } else {
                    log('❌ ERROR', 'Failed to create task', data);
                }
            } catch (error) {
                log('❌ ERROR', 'Network error', { error: error.message });
            }
        }

        function connectSSE(taskId) {
            if (eventSource) {
                eventSource.close();
            }

            const url = `${API_BASE}/tasks/${taskId}/stream`;
            log('🔌 CONNECTING', 'Establishing SSE connection...', { url });

            eventSource = new EventSource(url);

            eventSource.addEventListener('connected', (e) => {
                const data = JSON.parse(e.data);
                log('🔌 CONNECTED', data.message, data);
                updateConnectionStatus(true);
                updateTaskStatus(data.status);
            });

            eventSource.addEventListener('status_changed', (e) => {
                const data = JSON.parse(e.data);
                log('📊 STATUS', data.message, data);
                updateTaskStatus(data.status);
            });

            eventSource.addEventListener('token_generated', (e) => {
                const data = JSON.parse(e.data);
                const token = data.result?.token || '';
                const fullText = data.result?.text || '';
                log('🔤 TOKEN', `Token: "${token}"`, {token, fullText});
                // 可以在这里实时更新界面显示生成的文本
            });

            eventSource.addEventListener('completed', (e) => {
                const data = JSON.parse(e.data);
                log('✅ COMPLETED', data.message, data);
                updateTaskStatus('completed');
                disconnect();
                document.getElementById('cancelBtn').disabled = true;
            });

            eventSource.addEventListener('failed', (e) => {
                const data = JSON.parse(e.data);
                log('❌ FAILED', data.message, data);
                updateTaskStatus('failed');
                disconnect();
                document.getElementById('cancelBtn').disabled = true;
            });

            eventSource.addEventListener('cancelled', (e) => {
                const data = JSON.parse(e.data);
                log('🚫 CANCELLED', data.message, data);
                updateTaskStatus('cancelled');
                disconnect();
                document.getElementById('cancelBtn').disabled = true;
            });

            eventSource.onerror = (error) => {
                log('⚠️ ERROR', 'Connection error or closed', error);
                disconnect();
            };
        }

        function disconnect() {
            if (eventSource) {
                eventSource.close();
                eventSource = null;
            }
            updateConnectionStatus(false);
        }

        async function cancelTask() {
            if (!currentTaskId) return;

            try {
                const response = await fetch(`${API_BASE}/tasks/${currentTaskId}`, {
                    method: 'DELETE'
                });

                const data = await response.json();
                log('🚫 CANCEL', 'Cancel request sent', data);
            } catch (error) {
                log('❌ ERROR', 'Failed to cancel task', { error: error.message });
            }
        }

        // Cleanup on page unload
        window.addEventListener('beforeunload', () => {
            if (eventSource) {
                eventSource.close();
            }
        });
    </script>
</body>
</html>
